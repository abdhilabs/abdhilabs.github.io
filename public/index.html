<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <meta name="description" content="Abdhi — iOS Engineer. Portfolio, writing, and projects. Building seamless, high-performance iOS apps with Swift and SwiftUI." />
    <meta name="author" content="Abdhi" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph & Twitter: fallback for non-JS crawlers (homepage only). Helmet sets per-page og:url etc. when JS runs and deduplicates by property; non-JS crawlers see only these static values for all URLs. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://abdhilabs.com" />
    <meta property="og:title" content="Abdhi | iOS Engineer" />
    <meta property="og:description" content="Abdhi — iOS Engineer. Portfolio, writing, and projects. Building seamless, high-performance iOS apps with Swift and SwiftUI." />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Abdhi | iOS Engineer" />
    <meta name="twitter:description" content="Abdhi — iOS Engineer. Portfolio, writing, and projects. Building seamless, high-performance iOS apps with Swift and SwiftUI." />

    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />

    <title>Abdhi | iOS Engineer</title>

    <!-- JSON-LD: Person (for search engines) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Abdhi",
      "jobTitle": "iOS Engineer",
      "description": "iOS Engineer building seamless, high-performance apps with Swift and SwiftUI. Portfolio, writing, and open-source projects.",
      "url": "https://abdhilabs.com"
    }
    </script>
</head>

<body>
    <div id="root"></div>
</body>

</html>
